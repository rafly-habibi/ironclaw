name: Tests (Reborn)

on:
  workflow_call:
    inputs:
      ref:
        description: Commit SHA or ref to test
        required: false
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA or ref to test
        required: false
        type: string
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
    types:
      - checks_requested
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: reborn-tests-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  # Tests must never touch the real OS keychain (macOS Keychain auth dialog /
  # Linux Secret Service). Guarded by src/secrets/keychain.rs::os_keychain_suppressed:
  # cfg!(test) covers unit tests; this covers integration/e2e that link the
  # non-cfg(test) library.
  IRONCLAW_DISABLE_OS_KEYCHAIN: "1"
  # PR #5086 measured mold linking the heaviest Reborn build in parallel with
  # no OOM, so keep Cargo's default parallelism. If runner OOMs recur, restore
  # the previous one-job Cargo build serialization as the one-line fallback.
  RUSTFLAGS: "-C linker=clang -C link-arg=--ld-path=/usr/bin/mold"
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  # The 64-crate closure runs ~64 jobs that each resolve+download the dependency
  # tree from crates.io in parallel, so a transient registry SSL/HTTP2 hiccup
  # (e.g. "download of <crate> failed: curl [55] SSL_ERROR_SYSCALL") tends to hit
  # many jobs at once and redden the whole run. Make Cargo retry network failures
  # (default 3) far more aggressively, and use the git CLI for git deps.
  CARGO_NET_RETRY: "10"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  changes:
    name: Detect Reborn test scope
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.non_diff.outputs.docs_only || steps.diff.outputs.docs_only }}
      has_reborn_tests: ${{ steps.non_diff.outputs.has_reborn_tests || steps.diff.outputs.has_reborn_tests }}
    steps:
      - id: non_diff
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
        run: |
          echo "docs_only=false" >> "$GITHUB_OUTPUT"
          echo "has_reborn_tests=true" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: diff
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          CHANGED_FILES="$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")"

          echo "Changed files:"
          if [ -n "$CHANGED_FILES" ]; then
            printf '%s\n' "$CHANGED_FILES"
          else
            echo "<none>"
          fi

          printf '%s\n' "$CHANGED_FILES" | scripts/ci/classify-test-scope.sh >> "$GITHUB_OUTPUT"

  package-matrix:
    name: Discover Reborn package crates
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.has_reborn_tests == 'true'
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - id: packages
        name: Build package matrix from Reborn crate families
        run: |
          # Reborn/product crate families that are always tested, including
          # crates the shipped binary does not link (channel adapters, webui_v2).
          allowlist_packages="$(
            cargo metadata --no-deps --format-version 1 \
              | jq -c '
                  [
                    .packages[]
                    | select(
                        (.name | startswith("ironclaw_reborn"))
                        or (.name | startswith("ironclaw_product"))
                        or (.name == "ironclaw_architecture")
                        or (.name == "ironclaw_slack_v2_adapter")
                        or (.name == "ironclaw_telegram_v2_adapter")
                        or (.name == "ironclaw_wasm_product_adapters")
                        or (.name | startswith("ironclaw_webui_v2"))
                      )
                    | .name
                  ]
                  | unique
                '
          )"

          # The full ironclaw_reborn_cli dependency closure: every workspace
          # crate the shipped Reborn binary links (normal + build deps). Running
          # each crate's own suite on every PR is the "run everything on every
          # PR" gate -- a green reborn-tests run means the whole closure is
          # green, so the ~43 shared crates (auth, host_runtime, skills,
          # extensions, ...) can no longer regress unnoticed.
          closure_packages="$(
            comm -12 \
              <(cargo tree -p ironclaw_reborn_cli -e normal,build --prefix none \
                | grep -oE 'ironclaw_[a-z0-9_]+' \
                | sort -u) \
              <(cargo metadata --no-deps --format-version 1 \
                | jq -r '.packages[].name' \
                | sort -u) \
              | jq -R -s -c 'split("\n") | map(select(length > 0))'
          )"

          if [ -z "${closure_packages}" ] || [ "${closure_packages}" = "[]" ]; then
            echo "No Reborn CLI workspace dependency closure crates discovered" >&2
            exit 1
          fi

          # Union so closure coverage never drops the non-closure allowlist crates.
          packages="$(
            jq -n -c \
              --argjson allowlist "${allowlist_packages}" \
              --argjson closure "${closure_packages}" \
              '$allowlist + $closure | unique'
          )"

          if [ -z "${packages}" ] || [ "${packages}" = "[]" ]; then
            echo "No Reborn workspace crates discovered" >&2
            exit 1
          fi

          echo "packages=${packages}" >> "$GITHUB_OUTPUT"
          echo "Testing Reborn package crates:"
          printf '%s\n' "${packages}" | jq -r '.[] | "- " + .'

  crate-tests:
    name: Test ${{ matrix.package }}
    needs: [changes, package-matrix]
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.has_reborn_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ""
      LLM_BACKEND: ""
      LLM_USE_CODEX_AUTH: "false"
      OLLAMA_BASE_URL: ""
      OPENAI_API_KEY: ""
    strategy:
      fail-fast: true
      matrix:
        package: ${{ fromJSON(needs.package-matrix.outputs.packages) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h /

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install mold and clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold
          test -x /usr/bin/mold

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # ONE shared cache for all ~60 crate-test jobs instead of a per-crate
          # key. Per-crate keys produced ~60 caches (registry + target each,
          # ~0.4-0.7 GB), which blew far past GitHub's ~10 GB repo cache LRU and
          # evicted each other — so most jobs hit "No cache found", re-downloaded
          # the crates.io registry from cold, and were exposed to transient
          # download flakes (mitigated separately by CARGO_NET_RETRY). A single
          # shared key keeps the registry + shared-dep build in one small,
          # always-resident entry, so the registry is downloaded once, not ~60x.
          shared-key: reborn-tests-crates
          # Keep saves to protected-branch and merge_group runs so the ~10 GB
          # repo cache LRU is seeded by shared states, not arbitrary PR branches.
          save-if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'merge_group' }}

      - name: Run crate tests
        env:
          PACKAGE: ${{ matrix.package }}
        run: |
          feature_flags="$(scripts/ci/package-feature-flags.sh "$PACKAGE")"

          if [ "$PACKAGE" = "ironclaw_reborn_composition" ]; then
            echo "Disabling incremental compilation for ironclaw_reborn_composition to keep runner disk usage bounded."
            export CARGO_INCREMENTAL=0
          fi

          # shellcheck disable=SC2086 # feature_flags intentionally expands to zero or more Cargo args.
          timeout --signal=INT --kill-after=30s 28m \
            cargo test -p "$PACKAGE" ${feature_flags} --all-targets -- --nocapture

  root-reborn-parity-tests:
    name: Reborn root tests (${{ matrix.partition }})
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.has_reborn_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANTHROPIC_API_KEY: ""
      LLM_BACKEND: ""
      LLM_USE_CODEX_AUTH: "false"
      OLLAMA_BASE_URL: ""
      OPENAI_API_KEY: ""
      REBORN_ROOT_TEST_PARTITIONS: 4
      REBORN_ROOT_TEST_PARTITION: ${{ matrix.partition }}
      REBORN_ROOT_TEST_TIMEOUT: 28m
      CARGO_INCREMENTAL: "0"
    strategy:
      fail-fast: true
      matrix:
        partition: [0, 1, 2, 3]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h /

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install mold and clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold
          test -x /usr/bin/mold

      - name: Verify mold linker is active
        run: |
          clang_output="$(
            printf 'int main(void) { return 0; }\n' \
              | clang --ld-path=/usr/bin/mold -Wl,--version -x c - -o /tmp/clang-mold-check 2>&1
          )"
          printf '%s\n' "$clang_output"
          grep -qi mold <<< "$clang_output"

          printf 'fn main() { println!("mold-link-ok"); }\n' > /tmp/mold-link-check.rs
          rustc /tmp/mold-link-check.rs \
            -C linker=clang \
            -C link-arg=--ld-path=/usr/bin/mold \
            -o /tmp/mold-link-check
          test "$(/tmp/mold-link-check)" = "mold-link-ok"

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # All 4 root partitions compile the *same* root-package build (they
          # only run different test partitions), so one shared cache is strictly
          # better than 4 per-partition copies (~1 GB each) — the cached target
          # is fully valid for every partition, and it stops the 4 copies from
          # crowding the shared LRU.
          shared-key: reborn-tests-root
          # Keep saves to protected-branch and merge_group runs so the ~10 GB
          # repo cache LRU is seeded by shared states, not arbitrary PR branches.
          save-if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'merge_group' }}

      - name: Run Reborn root tests
        run: scripts/ci/run-reborn-root-partition.sh

  webui-v2-js-tests:
    name: Reborn WebUI v2 JS tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.has_reborn_tests == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: "22"

      - name: Run Reborn settings JS tests
        run: |
          mapfile -t tests < <(
            find crates/ironclaw_webui_v2_static/static/js/pages/settings \
              -type f \( -name '*.test.mjs' -o -name '*.test.js' \) \
              | sort
          )
          if [ "${#tests[@]}" -eq 0 ]; then
            echo "No Reborn settings JS tests found"
            exit 1
          fi
          node --test "${tests[@]}"

  qa-recorded-fixtures:
    name: Reborn QA recorded fixtures
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.has_reborn_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ""
      LLM_BACKEND: ""
      LLM_USE_CODEX_AUTH: "false"
      OLLAMA_BASE_URL: ""
      OPENAI_API_KEY: ""
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install mold
        run: |
          sudo apt-get update
          sudo apt-get install -y mold
          test -x /usr/bin/mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: reborn-qa-recorded-fixtures
          save-if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'merge_group' }}

      - name: Scrub Reborn QA fixtures
        run: scripts/ci/check-reborn-qa-fixtures.sh

      - name: Run Reborn QA fixture contracts and replay
        run: cargo test --test reborn_qa_recorded_behavior --features libsql -- --nocapture

  reborn-tests:
    name: Tests (Reborn)
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - package-matrix
      - crate-tests
      - root-reborn-parity-tests
      - webui-v2-js-tests
      - qa-recorded-fixtures
    steps:
      - name: Check Reborn test result
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes failed: ${{ needs.changes.result }}"
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.docs_only }}" == "true" ]]; then
            echo "Docs-only change detected — Reborn test roll-up passes fast"
            exit 0
          fi

          if [[ "${{ needs.changes.outputs.has_reborn_tests }}" != "true" ]]; then
            echo "No Reborn test scope detected — Reborn test roll-up passes fast"
            exit 0
          fi

          if [[ "${{ needs.package-matrix.result }}" != "success" ]]; then
            echo "Reborn package matrix discovery failed: ${{ needs.package-matrix.result }}"
            exit 1
          fi

          if [[ "${{ needs.crate-tests.result }}" != "success" ]]; then
            echo "One or more Reborn binary crate tests failed: ${{ needs.crate-tests.result }}"
            exit 1
          fi

          if [[ "${{ needs.root-reborn-parity-tests.result }}" != "success" ]]; then
            echo "One or more Reborn root tests failed: ${{ needs.root-reborn-parity-tests.result }}"
            exit 1
          fi

          if [[ "${{ needs.webui-v2-js-tests.result }}" != "success" ]]; then
            echo "Reborn WebUI v2 JS tests failed: ${{ needs.webui-v2-js-tests.result }}"
            exit 1
          fi

          if [[ "${{ needs.qa-recorded-fixtures.result }}" != "success" ]]; then
            echo "Reborn QA recorded fixture tests failed: ${{ needs.qa-recorded-fixtures.result }}"
            exit 1
          fi
