api_version = "ironclaw.product_adapter_manifest/v1"
kind = "ProductAdapterManifest"
adapter_id = "telegram-v2"
version = "0.1.0"
surface_kind = "external_channel"
component_ref = "file://adapters/telegram-v2.wasm"
manifest_hash = "sha256:telegram-v2-fixture"

[auth]
kind = "shared_secret_header"
header_name = "X-Telegram-Bot-Api-Secret-Token"

[capabilities]
flags = [
  "inbound_messages",
  "inbound_commands",
  "inbound_attachments",
  "external_final_reply_push",
  "delivery_status_reporting",
]

[[required_credentials]]
handle = "telegram_bot_token"

[[egress]]
host = "api.telegram.org"
credential_handle = "telegram_bot_token"
