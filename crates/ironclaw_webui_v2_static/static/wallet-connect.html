<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connect NEAR wallet</title>
    <!--
      Isolated NEAR-wallet connect popup. Opened by the SPA, it connects a NEAR
      wallet, signs the fixed NEAR AI login message (NEP-413), and posts the
      signature back over a random same-origin BroadcastChannel. Served with a
      dedicated relaxed CSP (see static/src/router.rs); it holds no session token
      or app state.
    -->
    <script type="importmap">
      {
        "imports": {
          "@hot-labs/near-connect": "https://esm.sh/@hot-labs/near-connect"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0b0f17;
        color: #e6edf3;
      }
      .card {
        max-width: 22rem;
        padding: 1.5rem;
        text-align: center;
        line-height: 1.5;
      }
      .title {
        font-size: 1.05rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      .status {
        font-size: 0.85rem;
        color: #9aa7b4;
      }
      .status.error {
        color: #ff6b81;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">Connect your NEAR wallet</div>
      <div id="status" class="status">Opening wallet…</div>
    </div>
    <script type="module" src="/v2/js/wallet-connect.js"></script>
  </body>
</html>
